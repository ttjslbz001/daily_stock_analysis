name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔎 Change Detection
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🧭 Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/dsa-web/**'
            backend:
              - 'src/**'
              - 'api/**'
              - 'tests/**'
              - 'requirements.txt'

  backend-gate:
    name: backend-gate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest
      - name: ✅ Run backend gate
        run: ./scripts/ci_gate.sh

  test-coverage:
    name: 🧪 Test Coverage
    runs-on: ubuntu-latest
    needs: [changes, backend-gate]
    if: needs.changes.outputs.backend == 'true'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run tests with coverage
        run: |
          pytest --cov=src --cov=api --cov-report=xml --cov-report=html --cov-report=term-missing --cov-fail-under=70 --junitxml=pytest-report.xml

      - name: 📊 Generate coverage summary
        run: |
          coverage report

      - name: 📤 Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
            pytest-report.xml
          retention-days: 30

      - name: 📋 Coverage summary
        if: always()
        run: |
          echo "## 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          coverage report >> $GITHUB_STEP_SUMMARY

      - name: 📈 Upload to Codecov (optional)
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: [backend-gate]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🐳 Build image
        run: |
          docker build -t stock-analysis:test -f docker/Dockerfile .
          docker run --rm stock-analysis:test python -c "print('✅ Docker OK')"
      - name: 🔍 Docker smoke imports
        run: |
          docker run --rm stock-analysis:test python -c "
          from src.config import get_config; print('✅ config')
          from src.storage import DatabaseManager; print('✅ storage')
          from src.notification import NotificationService; print('✅ notification')
          from data_provider import DataFetcherManager; print('✅ data_provider')
          from src.analyzer import GeminiAnalyzer; print('✅ analyzer')
          from patch.eastmoney_patch import eastmoney_patch; print('✅ patch')
          from bot.dispatcher import CommandDispatcher; print('✅ bot')
          from api.app import app; print('✅ api')
          print('✅ All Docker imports OK')
          "

  web-gate:
    name: web-gate
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: apps/dsa-web
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dsa-web/package-lock.json
      - name: 📦 Install
        run: npm ci
      - name: 🔎 Type Check
        run: npm run type-check
      - name: 🔍 Lint
        run: npm run lint
      - name: 🧪 Test
        run: npm run test:run -- --coverage
      - name: 📊 Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-reports
          path: |
            apps/dsa-web/coverage/
            apps/dsa-web/coverage-final.json
          retention-days: 30
      - name: 📋 Coverage summary
        if: always()
        working-directory: apps/dsa-web
        run: |
          echo "## 📊 Frontend Test Coverage" >> $GITHUB_STEP_SUMMARY
          cat coverage/index.html | grep -A 10 "header_c" >> $GITHUB_STEP_SUMMARY || echo "Coverage report generated"
      - name: 🏗️ Build
        run: npm run build
