# pytest configuration

[pytest]
# 测试文件路径
testpaths = tests

# 文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    api: API tests
    database: Database tests
    external: Tests that call external services

# 输出选项
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=src
    --cov=api
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=48
    --asyncio-mode=auto

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
source = src, api
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */venv/*
    */.venv/*
    */migrations/*

[coverage:report]
# 覆盖率阈值
fail_under = 48

# 输出选项
precision = 2
show_missing = true
skip_covered = false

# 排除特定行
exclude_lines =
    # pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    if __name__ == .__main__.:
    @abstractmethod

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml
